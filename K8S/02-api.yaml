apiVersion: v1
kind: Secret
metadata:
  name: worldcup-api-secret
type: Opaque
stringData:
  connection-string: "Server=worldcup-mysql;Port=3306;Database=WorldCupDb;User=root;Password=root;"
  jwt-key: "super_secret_key_world_cup_polling_system_2026_very_long_for_hmac_sha256"
  jwt-issuer: "WorldCupApp"
  jwt-audience: "WorldCupUsers"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldcup-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worldcup-backend
  template:
    metadata:
      labels:
        app: worldcup-backend
    spec:
      containers:
        - name: worldcup-backend
          image: <ACR_NAME>.azurecr.io/worldcup-backend:latest
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: worldcup-api-secret
                  key: connection-string
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: worldcup-api-secret
                  key: jwt-key
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: worldcup-api-secret
                  key: jwt-issuer
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: worldcup-api-secret
                  key: jwt-audience
            - name: RUN_MIGRATIONS
              value: "true"
            - name: ENABLE_SWAGGER
              value: "true"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /WeatherForecast
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: worldcup-backend
spec:
  selector:
    app: worldcup-backend
  ports:
    - port: 5085
      targetPort: 8080
